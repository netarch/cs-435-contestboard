<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title }}</title>
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c18;
      --surface:   #0e1526;
      --surface2:  #141e35;
      --border:    #1e2d4a;
      --border2:   #243860;
      --text:      #e2e8f5;
      --muted:     #6b7fa8;
      --accent:    #4f8ef7;
      --accent-dim:#1e3a6e;
      --gold:      #f5c842;
      --silver:    #9aaabf;
      --bronze:    #c87d3a;
      --success:   #34d399;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    html { font-size: 16px; }

    body {
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--surface) 1px, transparent 1px),
        linear-gradient(90deg, var(--surface) 1px, transparent 1px);
      background-size: 40px 40px;
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      border-bottom: 1px solid var(--border);
      background: rgba(8, 12, 24, 0.85);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0 2rem;
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      gap: 1rem;
    }

    .site-title {
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .site-title::before {
      content: '> ';
      color: var(--muted);
    }

    .badge {
      font-family: var(--mono);
      font-size: 0.7rem;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--border2);
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Main content ── */
    .wrapper {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Headings ── */
    h1, h2, h3 {
      font-family: var(--sans);
      font-weight: 600;
      color: var(--text);
    }

    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.25rem; margin: 2.5rem 0 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h3 { font-size: 1rem; margin: 2rem 0 0.75rem; }

    p  { color: var(--muted); margin-bottom: 1rem; }
    a  { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 0.875rem;
      margin: 1.5rem 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border2);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: var(--surface2); }

    td {
      padding: 12px 16px;
      color: var(--text);
      vertical-align: middle;
    }

    /* Rank medals */
    tbody tr:nth-child(1) td:first-child::before { content: '🥇 '; }
    tbody tr:nth-child(2) td:first-child::before { content: '🥈 '; }
    tbody tr:nth-child(3) td:first-child::before { content: '🥉 '; }

    tbody tr:nth-child(1) { background: rgba(245, 200, 66, 0.06); }
    tbody tr:nth-child(2) { background: rgba(154, 170, 191, 0.05); }
    tbody tr:nth-child(3) { background: rgba(200, 125, 58, 0.05); }

    tbody tr:nth-child(1) td { color: var(--gold); }
    tbody tr:nth-child(2) td { color: var(--silver); }
    tbody tr:nth-child(3) td { color: var(--bronze); }

    /* Numeric columns right-aligned */
    td:not(:first-child):not(:nth-child(2)),
    th:not(:first-child):not(:nth-child(2)) {
      text-align: right;
    }

    /* ── Code ── */
    code, pre {
      font-family: var(--mono);
      font-size: 0.85rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    code { padding: 2px 6px; color: var(--accent); }

    pre {
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 1rem 0;
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
    }

    /* ── Footer ── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .wrapper { padding: 2rem 1rem 4rem; }
      table { font-size: 0.78rem; }
      th, td { padding: 10px 10px; }
      .badge { display: none; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <span class="site-title">{{ site.title }}</span>
      <span class="badge">LIVE</span>
    </div>
  </header>

  <main class="wrapper">
    {{ content }}
  </main>

  <footer class="site-footer">
    CS 435 &mdash; University of Illinois Urbana-Champaign &mdash; {{ 'now' | date: "%Y" }}
  </footer>

</body>
</html>
